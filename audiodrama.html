<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Audiodrama Experience — Taylor Michaels</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="inner">
      <h1>Audiodrama Experience</h1>
      <p class="tagline">Shows, years, episode counts, and roles</p>
      <p><a href="/">← Back to home</a></p>
    </div>
  </header>

  <main class="content inner">
    <section class="controls card">
      <label for="colsRange">Images per row: <span id="colsValue">3</span></label>
      <input id="colsRange" type="range" min="1" max="6" value="3" />
    </section>

    <section id="shows" class="shows-grid" aria-live="polite">
      <!-- Cards will be rendered here by script -->
    </section>

    <section class="note card">
      <p>Images are placeholders for now. Replace the <code>image</code> URLs in the script with your uploaded artwork.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="inner">
      <p>© Taylor Michaels</p>
    </div>
  </footer>

  <script>
    // Configurable show data - update or expand with real values
    const shows = [
      { title: "The Grotto Pod", years: "2021-2025", episodes: 12, role: "Guest / Narrator", image: "https://via.placeholder.com/480x300?text=The+Grotto+Pod" },
      { title: "Woebegone", years: "2020-2025", episodes: 8, role: "Voice Actor", image: "https://via.placeholder.com/480x300?text=Woebegone" },
      { title: "The Redacted Unit", years: "2019-2024", episodes: 10, role: "Ensemble", image: "https://via.placeholder.com/480x300?text=Redacted+Unit" },
      { title: "Nowhere On Air", years: "2018-2022", episodes: 6, role: "Guest", image: "https://via.placeholder.com/480x300?text=Nowhere+On+Air" },
      { title: "The Storage Papers", years: "2022", episodes: 1, role: "Narrator", image: "https://via.placeholder.com/480x300?text=Storage+Papers" },
      { title: "Wake of Corrosion", years: "2020-2021", episodes: 4, role: "Voice Actor", image: "https://via.placeholder.com/480x300?text=Wake+of+Corrosion" },
      { title: "Breathing Space", years: "2019-2023", episodes: 5, role: "Guest", image: "https://via.placeholder.com/480x300?text=Breathing+Space" },
      { title: "Fresh Meat Cast", years: "2021-2024", episodes: 3, role: "Supporting", image: "https://via.placeholder.com/480x300?text=Fresh+Meat+Cast" }
    ];

    const grid = document.getElementById('shows');

    function renderShows() {
      grid.innerHTML = '';
      shows.forEach(s => {
        const card = document.createElement('article');
        card.className = 'show-card';

        const img = document.createElement('img');
        img.src = s.image;
        img.alt = s.title + ' artwork (placeholder)';
        card.appendChild(img);

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `<h3>${s.title}</h3>
                          <p class="muted">${s.years} · ${s.episodes} episode${s.episodes !== 1 ? 's' : ''}</p>
                          <p class="role">${s.role}</p>`;
        card.appendChild(meta);

        grid.appendChild(card);
      });
    }

    // Initial render
    renderShows();

    // Images-per-row control
    const colsRange = document.getElementById('colsRange');
    const colsValue = document.getElementById('colsValue');
    function setCols(val) {
      colsValue.textContent = val;
      document.documentElement.style.setProperty('--cols', val);
    }
    colsRange.addEventListener('input', (e) => setCols(e.target.value));
    // set default from input value
    setCols(colsRange.value);
  </script>
</body>
</html>
